name: Adobe Launch Sync

# ── Trigger logic ────────────────────────────────────────────────────────────
#
# Runs on every push to any branch, but only when files under properties/
# change. A single job calls `sync --ci` for the property.
#
# The sync command itself determines what to do based on the environmentId
# in reactor-settings.json and the environment type returned by the Launch API:
#
#   No environmentId     → draft mode: push changes to drafts, no publish
#   environmentId: dev   → push drafts + create git-sync-* library + dev build
#   environmentId: stage → find git-sync-* library in "development", promote
#   environmentId: prod  → find git-sync-* library in "submitted", approve + build
#
# The --ci flag only has effect in dev/draft mode: it aborts if any resource
# in Launch is newer than local (Behind). In staging/prod mode the flag is
# silently ignored because those flows skip the diff entirely.
#
# No branch name detection needed — the reactor-settings.json on each branch
# carries the correct environmentId for that branch's target environment.
# The file is protected from being overwritten during merges via .gitattributes.
#
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: ['**']

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for property changes
        id: check
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^properties/' || true)
          if [ -z "$CHANGED" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in properties/ — skipping sync."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in properties/: $CHANGED"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.changed == 'true'
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.check.outputs.changed == 'true'
        run: npm ci

      - name: Write integration.json
        if: steps.check.outputs.changed == 'true'
        run: |
          jq -n \
            --arg clientId "${{ secrets.ADOBE_CLIENT_ID }}" \
            --arg clientSecret "${{ secrets.ADOBE_CLIENT_SECRET }}" \
            --arg orgId "${{ secrets.ADOBE_ORG_ID }}" \
            '{"clientId":$clientId,"clientSecret":$clientSecret,"orgId":$orgId}' \
            > integration.json

      # --ci aborts with exit 1 if any resource is Behind in dev/draft mode.
      # In staging/prod mode the flag is ignored — the flow skips diff entirely.
      - name: Sync to Adobe Launch
        if: steps.check.outputs.changed == 'true'
        run: node bin/index.js sync --settings-path properties/property1/reactor-settings.json --ci
